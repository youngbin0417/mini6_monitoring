# ============================================================
# Grafana 대시보드 자동 프로비저닝
# ============================================================
# /var/lib/grafana/dashboards 디렉토리의 JSON 파일을 자동 임포트합니다.

apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Provisioned'
    folderUid: 'provisioned'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 60     # 60초마다 변경 감지
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
