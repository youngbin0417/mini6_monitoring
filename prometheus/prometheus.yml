# ============================================================
# Prometheus 메인 설정
# ============================================================

global:
  scrape_interval: 15s # 기본 메트릭 수집 간격
  evaluation_interval: 15s # 알람 규칙 평가 간격
  scrape_timeout: 10s # 수집 타임아웃

  external_labels:
    monitor: "aivle05-monitoring"
    environment: "prod"

# ---- 알람 규칙 파일 ----
rule_files:
  - "alert.rules.yml"

# ---- 수집 대상 설정 ----
scrape_configs:
  # 1) Prometheus 자체 모니터링
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "monitoring-server"

  # 2) 모니터링 인스턴스의 Node Exporter (자체 서버 메트릭)
  - job_name: "monitoring-node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance: "monitoring-server"
          role: "monitoring"

  # 3) Loki 메트릭 (Loki 자체 상태 모니터링)
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          instance: "loki"

  # 4) Grafana 메트릭
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          instance: "grafana"

  # 5) CloudWatch Exporter (ALB/ASG 메트릭)
  - job_name: "cloudwatch"
    static_configs:
      - targets: ["yace:5000"]
        labels:
          instance: "cloudwatch-exporter"
    scrape_interval: 60s # CloudWatch API 호출 빈도 제한을 위해 60초 간격

  # ============================================================
  # 📦 서비스 인스턴스 Node Exporter
  # ============================================================
  # ---- EC2 Auto Discovery (ASG/동적 인스턴스 자동 탐색) ----
  # Prometheus가 AWS EC2 API를 통해 실행 중인 인스턴스를 자동 감지
  # ⚠️ 사전 요구: 모니터링 EC2에 ec2:DescribeInstances IAM 권한 필요
  - job_name: 'aivle05-service-discovery'
    ec2_sd_configs:
      - region: 'us-east-1'
        port: 9100
        filters:
          - name: 'instance-state-name'
            values: ['running']

    relabel_configs:
      # 1) Project=aivle05 태그가 붙은 인스턴스만 수집
      - source_labels: [__meta_ec2_tag_Project]
        regex: 'aivle05'
        action: keep

      # 2) Role 태그를 role 라벨로 매핑 (backend, frontend 등)
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role

      # 3) Color 태그를 color 라벨로 매핑 (Blue/Green 배포 구분)
      - source_labels: [__meta_ec2_tag_Color]
        target_label: color

      # 4) Name 태그를 서버 이름으로 매핑
      - source_labels: [__meta_ec2_tag_Name]
        target_label: server_name

      # 5) EC2 인스턴스 ID를 instance_id 라벨로 매핑
      - source_labels: [__meta_ec2_instance_id]
        target_label: instance_id

      # 6) EC2 사설 IP를 instance 라벨로 매핑 (기본 __address__ 대신 읽기 쉽게)
      - source_labels: [__meta_ec2_private_ip]
        regex: '(.+)'
        replacement: '${1}:9100'
        target_label: __address__

      # 7) 사설 IP를 별도 라벨로도 보관
      - source_labels: [__meta_ec2_private_ip]
        target_label: private_ip

  # ---- 정적 백엔드 타겟 (VPC 피어링, ASG 미사용 인스턴스용 폴백) ----
  # ASG 미적용 서버는 아래에 직접 IP를 추가
  - job_name: 'aivle05-book-backend'
    static_configs:
      - targets:
          - '172.31.21.34:9100'
        labels:
          role: 'backend'

