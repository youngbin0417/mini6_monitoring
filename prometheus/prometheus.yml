# ============================================================
# Prometheus 메인 설정
# ============================================================

global:
  scrape_interval: 15s # 기본 메트릭 수집 간격
  evaluation_interval: 15s # 알람 규칙 평가 간격
  scrape_timeout: 10s # 수집 타임아웃

  external_labels:
    monitor: "aivle05-monitoring"
    environment: "prod"

# ---- 알람 규칙 파일 ----
rule_files:
  - "alert.rules.yml"

# ---- 수집 대상 설정 ----
scrape_configs:
  # 1) Prometheus 자체 모니터링
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "monitoring-server"

  # 2) 모니터링 인스턴스의 Node Exporter (자체 서버 메트릭)
  - job_name: "monitoring-node"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance: "monitoring-server"
          role: "monitoring"

  # 3) Loki 메트릭 (Loki 자체 상태 모니터링)
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          instance: "loki"

  # 4) Grafana 메트릭
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          instance: "grafana"

  # ============================================================
  # 📦 서비스 인스턴스 Node Exporter (추후 추가)
  # ============================================================
  # # 1) 프론트엔드 서비스 (aivle05-book-frontend)
  # - job_name: 'aivle05-book-frontend'
  #   static_configs:
  #     - targets:
  #         - '<프론트엔드-인스턴스-IP>:9100'
  #       labels:
  #         role: 'frontend'
  #
  # 1) 백엔드 서비스 (aivle05-book-backend)
  - job_name: 'aivle05-book-backend'
    static_configs:
      - targets:
          - '172.31.21.34:9100'
        labels:
          role: 'backend'
